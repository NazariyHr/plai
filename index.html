<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Плай — база маршрутів спільноти Гуртом</title>
  <!--
    Обгортка для Плаю: ховає банер Google «created by a Google Apps Script user»
    і дає людську адресу. Як користуватись:
    1. Встав нижче в src ПРОДОВИЙ /exec-лінк веб-застосунку (Апс Скрипт → Розгортання).
    2. Закинь цей файл на будь-який статичний хостинг (Cloudflare Pages / GitHub Pages / Netlify).
    3. Спільноті даєш адресу хостингу, а не script.google.com.
  -->
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f2f5f1; }
    iframe { display: block; width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe id="app" allow="clipboard-write" title="Плай"></iframe>
  <script>
    // Прокидаємо параметри адреси (напр. ?p=… — особистий лінк входу) всередину застосунку
    var base = 'https://script.google.com/macros/s/AKfycbzktTmWQYuxiDObDa7j5JLH06bS7HkupqB-KGM_DTyhKpk--vcHn46BdgdzA0E98ZNt/exec';
    document.getElementById('app').src = base + (location.search || '');
  </script>
</body>
</html>
